  .soc{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.4)}
  .soc svg{width:16px;height:16px;fill:#fff}
  .copy{margin-top:32px;font-size:12px;color:rgba(255,255,255,.4)}
